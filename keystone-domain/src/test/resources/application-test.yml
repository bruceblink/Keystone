# 测试环境数据源与 Redis 配置

spring:
  datasource:
    driver-class-name: org.h2.Driver
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: jdbc:h2:mem:keystone;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
          h2:
            console:
              enabled: true
              settings:
                trace: true
                web-allow-others: true
              path: /h2-console

  sql:
    init:
      platform: mysql
      schema-locations: classpath:db/migrate/h2/keystone_schema.sql
      data-locations: classpath:db/migrate/h2/keystone_data.sql

  data:
    redis:
      host: localhost
      port: 36379
      database: 0
      timeout: 10s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms
