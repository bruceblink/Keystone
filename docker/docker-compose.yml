networks:
  keystone:
    name: keystone_shared
    driver: bridge

volumes:
  mysql-data:
  redis-data:

services:

  # ─────────────────────────────────────────
  # MySQL 8.4  (UTC 时区)
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: infra_mysql
    restart: unless-stopped
    environment:
      TZ: UTC
      LANG: en_US.UTF-8
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-12345}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-keystone}
    volumes:
      - ./mysql/conf/my.cnf:/etc/my.cnf
      - mysql-data:/var/lib/mysql
      - ./mysql/log:/var/log/mysql
      - ../sql/mysql8:/docker-entrypoint-initdb.d
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    networks:
      - keystone
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-12345}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # Redis 8.6.2-alpine
  # ─────────────────────────────────────────
  redis:
    image: redis:8.6.2-alpine
    container_name: infra_redis
    restart: unless-stopped
    command: >
      redis-server /etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD:-12345}
      --appendonly no
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    environment:
      TZ: UTC
    volumes:
      - redis-data:/data
      - ./redis/config/redis.conf:/etc/redis/redis.conf
    ports:
      - "${REDIS_BIND_HOST:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"
    mem_limit: ${REDIS_CONTAINER_MEM_LIMIT:-512m}
    networks:
      - keystone
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-12345}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────
  # Keystone Admin 后端
  # ─────────────────────────────────────────
  sys_manage_backend:
    build:
      context: ..
      dockerfile: Dockerfile
    image: keystone:latest
    container_name: sys_manage_backend
    restart: unless-stopped
    environment:
      TZ: UTC
      SPRING_CONFIG_ADDITIONAL_LOCATION: optional:file:/app/config/
      # dev profile 默认连接 localhost；此处环境变量覆盖为容器名，实现容器内互联
      SPRING_PROFILES_ACTIVE: prod
      KEYSTONE_AUTH_MODE: ${KEYSTONE_AUTH_MODE:-mixed}
      KEYSTONE_AUTH_KEYLO_ENABLED: ${KEYSTONE_AUTH_KEYLO_ENABLED:-true}
      KEYLO_ISSUER_URI: ${KEYLO_ISSUER_URI:-}
      KEYLO_JWK_SET_URI: ${KEYLO_JWK_SET_URI:-}
      KEYLO_AUDIENCE: ${KEYLO_AUDIENCE:-}
      KEYLO_SUBJECT_CLAIM: ${KEYLO_SUBJECT_CLAIM:-sub}
      KEYLO_CREDENTIAL_VERIFY_URL: ${KEYLO_CREDENTIAL_VERIFY_URL:-}
      KEYLO_CREDENTIAL_AUTH_HEADER_NAME: ${KEYLO_CREDENTIAL_AUTH_HEADER_NAME:-Authorization}
      KEYLO_CREDENTIAL_AUTH_HEADER_VALUE: ${KEYLO_CREDENTIAL_AUTH_HEADER_VALUE:-}
      KEYLO_CREDENTIAL_USERNAME_FIELD: ${KEYLO_CREDENTIAL_USERNAME_FIELD:-username}
      KEYLO_CREDENTIAL_PASSWORD_FIELD: ${KEYLO_CREDENTIAL_PASSWORD_FIELD:-password}
      KEYLO_PROVISIONING_ENABLED: ${KEYLO_PROVISIONING_ENABLED:-false}
      KEYLO_CREATE_USER_URL: ${KEYLO_CREATE_USER_URL:-}
      KEYLO_AUTH_HEADER_NAME: ${KEYLO_AUTH_HEADER_NAME:-Authorization}
      KEYLO_AUTH_HEADER_VALUE: ${KEYLO_AUTH_HEADER_VALUE:-}
      KEYLO_TIMEOUT_MILLIS: ${KEYLO_TIMEOUT_MILLIS:-10000}
      KEYLO_SUBJECT_FIELD: ${KEYLO_SUBJECT_FIELD:-subject}
      KEYLO_USERNAME_FIELD: ${KEYLO_USERNAME_FIELD:-username}
      KEYLO_NICKNAME_FIELD: ${KEYLO_NICKNAME_FIELD:-nickname}
      KEYLO_EMAIL_FIELD: ${KEYLO_EMAIL_FIELD:-email}
      KEYLO_PHONE_FIELD: ${KEYLO_PHONE_FIELD:-phoneNumber}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-keystone}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-12345}
      KEYSTONE_DATASOURCE_PASSWORD_ENCRYPTION_ENABLED: ${KEYSTONE_DATASOURCE_PASSWORD_ENCRYPTION_ENABLED:-false}
      KEYSTONE_DATASOURCE_ENCRYPT_KEY: ${KEYSTONE_DATASOURCE_ENCRYPT_KEY:-}
      SPRING_REDIS_URL: redis://:${REDIS_PASSWORD:-12345}@redis:6379/0
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-12345}
      SPRING_REDIS_DATABASE: 0
      TOKEN_SECRET: ${TOKEN_SECRET:-changeme-please-update-in-production}
      DRUID_PASSWORD: ${DRUID_PASSWORD:-keystone}
      LOG_PATH: /app/logs
      KEYSTONE_FILE_BASE_DIR: /app/data
    ports:
      - "${APP_HOST_PORT:-18080}:18080"
    networks:
      - keystone
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app/logs:/app/logs
      - ./app/data:/app/data
      - ./app/config:/app/config
