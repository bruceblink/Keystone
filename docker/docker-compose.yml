networks:
  keystone:
    driver: bridge

volumes:
  mysql-data:
  redis-data:

services:

  # ─────────────────────────────────────────
  # MySQL 8.4  (UTC 时区)
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: keystone-mysql
    restart: unless-stopped
    environment:
      TZ: UTC
      LANG: en_US.UTF-8
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-12345}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agileboot}
    volumes:
      - ./mysql/conf/my.cnf:/etc/my.cnf
      - mysql-data:/var/lib/mysql
      - ./mysql/log:/var/log/mysql
      - ../sql/mysql8:/docker-entrypoint-initdb.d
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    networks:
      - agileboot
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-12345}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # Redis 8.6.2-alpine
  # ─────────────────────────────────────────
  redis:
    image: redis:8.6.2-alpine
    container_name: keystone-redis
    restart: unless-stopped
    command: >
      redis-server /etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD:-12345}
      --appendonly no
    environment:
      TZ: UTC
    volumes:
      - redis-data:/data
      - ./redis/config/redis.conf:/etc/redis/redis.conf
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - agileboot
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-12345}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────
  # Keystone Admin 后端
  # ─────────────────────────────────────────
  keystone-admin:
    build:
      context: ..
      dockerfile: Dockerfile
    image: keystone-admin:latest
    container_name: keystone-admin
    restart: unless-stopped
    environment:
      TZ: UTC
      SPRING_PROFILES_ACTIVE: basic,docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-agileboot}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-12345}
      AGILEBOOT_DATASOURCE_PASSWORD_ENCRYPTION_ENABLED: ${AGILEBOOT_DATASOURCE_PASSWORD_ENCRYPTION_ENABLED:-false}
      AGILEBOOT_DATASOURCE_ENCRYPT_KEY: ${AGILEBOOT_DATASOURCE_ENCRYPT_KEY:-}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-12345}
      TOKEN_SECRET: ${TOKEN_SECRET:-changeme-please-update-in-production}
      DRUID_PASSWORD: ${DRUID_PASSWORD:-agileboot}
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    networks:
      - agileboot
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app/logs:/app/logs
      - ./app/data:/app/data
