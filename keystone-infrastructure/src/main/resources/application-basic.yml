# =============================================================================
# 公共基础配置 - 由 keystone-infrastructure 模块提供
# 由 keystone-admin/application.yml 通过 spring.config.import 显式导入，
# 环境配置(application-dev.yml / application-prod.yml / application-test.yml)可在其之上覆盖
# =============================================================================

# ---- Spring 公共配置 ----
spring:
  messages:
    basename: i18n/messages
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  devtools:
    restart:
      enabled: false
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss

  # ---- Druid 公共配置（监控 UI + 连接池参数）----
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true
        allow:
        url-pattern: /druid/*
        login-username: ${DRUID_USERNAME:keystone}
        login-password: ${DRUID_PASSWORD:}
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/keystone?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
          username: ${SPRING_DATASOURCE_USERNAME:root}
          # 支持 secret:v1:aes-256-gcm 密文，开启 keystone.datasource.password-encryption.enabled 后自动解密
          password: ${SPRING_DATASOURCE_PASSWORD:12345}
      druid:
        initialSize: 5
        minIdle: 10
        maxActive: 20
        maxWait: 60000
        timeBetweenEvictionRunsMillis: 60000
        minEvictableIdleTimeMillis: 300000
        maxEvictableIdleTimeMillis: 900000
        validationQuery: SELECT 1 FROM DUAL
        testWhileIdle: true
        testOnBorrow: false
        testOnReturn: false

  # ---- Redis 公共配置 ----
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      password: ${SPRING_DATA_REDIS_PASSWORD:12345}
      timeout: 10s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false
    locations:
      - classpath:db/migrate/common
      - classpath:db/migrate/mysql

# ---- 日志配置 ----
logging:
  level:
    app.keystone: debug
    org.springframework: info
  file:
    path: ${LOG_PATH:logs}
  pattern:
    console: "%date requestId:%X{${keystone.traceRequestIdKey}} %thread %green(%level) [%cyan(%logger{10}):%magenta(%line)] %red(%method) | %msg%n"

# ---- JWT Token ----
token:
  header: Authorization
  secret: ${TOKEN_SECRET:sdhfkjshBN6rr32df38}
  expirationSeconds: 1800
  autoRefreshTime: 20

# ---- MyBatis-Plus ----
mybatis-plus:
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  configuration:
    cacheEnabled: true
    useGeneratedKeys: true
    defaultExecutorType: SIMPLE
    logImpl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    refresh: true

# ---- 分页插件（默认 MySQL）----
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# ---- SpringDoc / Swagger ----
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
    groups:
      enabled: true
  packages-to-scan: app.keystone

# ---- 项目配置 ----
keystone:
  file-base-dir: ${KEYSTONE_FILE_BASE_DIR:D:/keystone}
  demo-enabled: false
  auth:
    mode: ${KEYSTONE_AUTH_MODE:local}
    keylo:
      enabled: ${KEYSTONE_AUTH_KEYLO_ENABLED:false}
      base-url: ${KEYLO_BASE_URL:http://127.0.0.1:2345}
      issuer-uri: ${KEYLO_ISSUER_URI:${keystone.auth.keylo.base-url}}
      trusted-issuers: ${KEYLO_TRUSTED_ISSUERS:${keystone.auth.keylo.issuer-uri}}
      jwk-set-uri: ${KEYLO_JWK_SET_URI:${keystone.auth.keylo.base-url}/.well-known/jwks.json}
      legacy-token-login-enabled: ${KEYLO_LEGACY_TOKEN_LOGIN_ENABLED:true}
      subject-claim: ${KEYLO_SUBJECT_CLAIM:sub}
      user-id-claim: ${KEYLO_USER_ID_CLAIM:uid}
      clock-skew-seconds: ${KEYLO_CLOCK_SKEW_SECONDS:60}
      audiences: ${KEYLO_AUDIENCES:admin-backend}
      credential-auth-header-name: ${KEYLO_CREDENTIAL_AUTH_HEADER_NAME:Authorization}
      credential-auth-header-value: ${KEYLO_CREDENTIAL_AUTH_HEADER_VALUE:}
      credential-username-field: ${KEYLO_CREDENTIAL_USERNAME_FIELD:client_id}
      credential-password-field: ${KEYLO_CREDENTIAL_PASSWORD_FIELD:client_secret}
      credential-verify-url: ${KEYLO_CREDENTIAL_VERIFY_URL:${keystone.auth.keylo.base-url}/v1/auth/token}
      provisioning:
        enabled: ${KEYLO_PROVISIONING_ENABLED:false}
        admin-client-id: ${KEYLO_ADMIN_CLIENT_ID:cli-admin-root}
        admin-client-secret: ${KEYLO_ADMIN_CLIENT_SECRET:replace-with-strong-admin-secret}
        create-user-url: ${KEYLO_CREATE_USER_URL:${keystone.auth.keylo.base-url}/v1/admin/users}
        admin-token-url: ${KEYLO_ADMIN_TOKEN_URL:${keystone.auth.keylo.base-url}/v1/admin/token}
        auth-header-name: ${KEYLO_AUTH_HEADER_NAME:Authorization}
        auth-header-value: ${KEYLO_AUTH_HEADER_VALUE:}
        timeout-millis: ${KEYLO_TIMEOUT_MILLIS:10000}
        subject-field: ${KEYLO_SUBJECT_FIELD:sub}
        subject-template: ${KEYLO_SUBJECT_TEMPLATE:user:{username}}
        user-id-field: ${KEYLO_USER_ID_FIELD:id}
        username-field: ${KEYLO_USERNAME_FIELD:username}
        nickname-field: ${KEYLO_NICKNAME_FIELD:nickname}
        email-field: ${KEYLO_EMAIL_FIELD:email}
        phone-field: ${KEYLO_PHONE_FIELD:phoneNumber}
        password-field: ${KEYLO_PASSWORD_FIELD:password}
  name: Keystone
  version: 3.4.0
  copyright-year: 2026
  addressEnabled: false
  captchaType: math
  checkI18nKey: false
  traceRequestIdKey: AG-RequestId
  # 对应的公钥放在前端项目中的 utils/rsaUtils 类中
  rsaPrivateKey: ${KEYSTONE_RSA_PRIVATE_KEY}
  datasource:
    password-encryption:
      # 是否启用数据库密码 secret:v1:aes-256-gcm 自动解密
      enabled: ${KEYSTONE_DATASOURCE_PASSWORD_ENCRYPTION_ENABLED:false}
      # AES-256 key，建议通过环境变量注入
      encrypt-key: ${KEYSTONE_DATASOURCE_ENCRYPT_KEY:}
  frontend:
    url: ${KEYSTONE_FRONTEND_URL:http://localhost:80}
