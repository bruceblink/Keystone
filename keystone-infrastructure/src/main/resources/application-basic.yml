# =============================================================================
# 公共基础配置 - 由 keystone-infrastructure 模块提供
# 通过 spring.profiles.group 自动与各环境 profile 一起加载，无需手动指定 basic
# =============================================================================

# ---- Spring 公共配置 ----
spring:
  messages:
    basename: i18n/messages
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  devtools:
    restart:
      enabled: false
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss

  # ---- Druid 公共配置（监控 UI + 连接池参数；连接信息由各环境 profile 覆盖）----
  datasource:
    druid:
      webStatFilter:
        enabled: true
      statViewServlet:
        enabled: true
        allow:
        url-pattern: /druid/*
        login-username: keystone
        login-password: ${DRUID_PASSWORD:123456}
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
    dynamic:
      primary: master
      strict: false
      druid:
        initialSize: 5
        minIdle: 10
        maxActive: 20
        maxWait: 60000
        timeBetweenEvictionRunsMillis: 60000
        minEvictableIdleTimeMillis: 300000
        maxEvictableIdleTimeMillis: 900000
        validationQuery: SELECT 1 FROM DUAL
        testWhileIdle: true
        testOnBorrow: false
        testOnReturn: false

  # ---- Redis Lettuce 连接池公共配置（host/port/password 由各环境 profile 覆盖）----
  data:
    redis:
      timeout: 10s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms

  flyway:
    enabled: false
    validate-on-migrate: true
    out-of-order: false

# ---- 日志配置 ----
logging:
  level:
    app.keystone: debug
    org.springframework: info
  file:
    path: ${LOG_PATH:logs}
  pattern:
    console: "%date requestId:%X{${keystone.traceRequestIdKey}} %thread %green(%level) [%cyan(%logger{10}):%magenta(%line)] %red(%method) | %msg%n"

# ---- JWT Token ----
token:
  header: Authorization
  secret: ${TOKEN_SECRET:sdhfkjshBN6rr32df38}
  autoRefreshTime: 20

# ---- MyBatis-Plus ----
mybatis-plus:
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  configuration:
    cacheEnabled: true
    useGeneratedKeys: true
    defaultExecutorType: SIMPLE
    logImpl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    refresh: true

# ---- 分页插件（默认 MySQL）----
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# ---- SpringDoc / Swagger ----
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
    groups:
      enabled: true
  packages-to-scan: app.keystone

# ---- 项目配置 ----
keystone:
  auth:
    keylo:
      subject-claim: ${KEYLO_SUBJECT_CLAIM:sub}
      user-id-claim: ${KEYLO_USER_ID_CLAIM:uid}
      clock-skew-seconds: ${KEYLO_CLOCK_SKEW_SECONDS:60}
      audiences: ${KEYLO_AUDIENCES:admin-backend}
      audience: ${KEYLO_AUDIENCE:}
      credential-auth-header-name: ${KEYLO_CREDENTIAL_AUTH_HEADER_NAME:Authorization}
      credential-auth-header-value: ${KEYLO_CREDENTIAL_AUTH_HEADER_VALUE:}
      credential-username-field: ${KEYLO_CREDENTIAL_USERNAME_FIELD:client_id}
      credential-password-field: ${KEYLO_CREDENTIAL_PASSWORD_FIELD:client_secret}
      provisioning:
        auth-header-name: ${KEYLO_AUTH_HEADER_NAME:Authorization}
        auth-header-value: ${KEYLO_AUTH_HEADER_VALUE:}
        timeout-millis: ${KEYLO_TIMEOUT_MILLIS:10000}
        subject-field: ${KEYLO_SUBJECT_FIELD:sub}
        subject-template: ${KEYLO_SUBJECT_TEMPLATE:user:{username}}
        user-id-field: ${KEYLO_USER_ID_FIELD:id}
        username-field: ${KEYLO_USERNAME_FIELD:username}
        nickname-field: ${KEYLO_NICKNAME_FIELD:nickname}
        email-field: ${KEYLO_EMAIL_FIELD:email}
        phone-field: ${KEYLO_PHONE_FIELD:phoneNumber}
        password-field: ${KEYLO_PASSWORD_FIELD:password}
  name: Keystone
  version: 3.4.0
  copyright-year: 2026
  demo-enabled: true
  addressEnabled: false
  captchaType: math
  checkI18nKey: false
  traceRequestIdKey: AG-RequestId
  # 对应的公钥放在前端项目中的 utils/rsaUtils 类中
  rsaPrivateKey: 
  datasource:
    password-encryption:
      # 是否启用数据库密码 ENC(...) 自动解密
      enabled: ${KEYSTONE_DATASOURCE_PASSWORD_ENCRYPTION_ENABLED:false}
      # AES key，建议通过环境变量注入
      encrypt-key: ${KEYSTONE_DATASOURCE_ENCRYPT_KEY:}
  embedded:
    mysql: false
    redis: false
  frontend:
    url: ${KEYSTONE_FRONTEND_URL:http://localhost:80}
