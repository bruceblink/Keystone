# -------------------------
# Spring Boot 数据源 & Redis 配置
# -------------------------
spring:
  # 数据源配置（Druid）
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: org.postgresql.Driver
    # 使用完整 URL，环境变量覆盖
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agileboot}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

    druid:
      webStatFilter:
        enabled: true
      statViewServlet:
        enabled: true
        # Druid 控制台登录用户名密码
        login-username: ${DRUID_USERNAME:agileboot}
        login-password: ${DRUID_PASSWORD:123456}
      filter:
        stat:
          enabled: true

    dynamic:
      primary: master
      strict: false
      druid:
        initialSize: 5
        minIdle: 10
        maxActive: 20
        maxWait: 60000
        timeBetweenEvictionRunsMillis: 60000
        minEvictableIdleTimeMillis: 300000
        maxEvictableIdleTimeMillis: 900000
        validationQuery: SELECT 1
        testWhileIdle: true
        testOnBorrow: false
        testOnReturn: false
      datasource:
        master:
          url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agileboot}
          username: ${SPRING_DATASOURCE_USERNAME:postgres}
          password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  # Redis 配置（支持完整 URL 或单独 host/port/password）
  redis:
    # 如果你拿到的是完整 URL，直接使用 SPRING_REDIS_URL
    url: ${SPRING_REDIS_URL:}
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
    database: ${SPRING_REDIS_DATABASE:0}
    timeout: 10s
    lettuce:
      pool:
        min-idle: 0
        max-idle: 8
        max-active: 8
        max-wait: -1ms

# -------------------------
# 日志配置
# -------------------------
logging:
  file:
    path: /app/logs

# -------------------------
# Springdoc / Swagger 配置
# -------------------------
springdoc:
  swagger-ui:
    enabled: true
    url: ${AGILEBOOT_API_PREFIX:/dev-api}/v3/api-docs
    config-url: ${AGILEBOOT_API_PREFIX:/dev-api}/v3/api-docs/swagger-config

# -------------------------
# 项目相关配置
# -------------------------
agileboot:
  file-base-dir: /app/data
  api-prefix: ${AGILEBOOT_API_PREFIX:/dev-api}
  demo-enabled: false
