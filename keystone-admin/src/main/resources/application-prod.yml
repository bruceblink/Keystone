# 生产环境配置（MySQL + Redis）
# 公共基础配置在 application-basic.yml 中；敏感值优先通过环境变量注入。

keystone:
  file-base-dir: ${KEYSTONE_FILE_BASE_DIR:/app/data}
  demo-enabled: false
  auth:
    mode: ${KEYSTONE_AUTH_MODE:mixed}
    keylo:
      enabled: ${KEYSTONE_AUTH_KEYLO_ENABLED:true}
      base-url: ${KEYLO_BASE_URL:http://10.17.17.7:2345}
      provisioning:
        enabled: ${KEYLO_PROVISIONING_ENABLED:false}
        admin-client-id: ${KEYLO_ADMIN_CLIENT_ID:cli-admin-root}
        admin-client-secret: ${KEYLO_ADMIN_CLIENT_SECRET:replace-with-strong-admin-secret}
  frontend:
    url: ${KEYSTONE_FRONTEND_URL:http://localhost:80}

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      stat-view-servlet:
        # 生产环境 Druid 控制台凭证（必须通过环境变量设置，不提供默认密码）
        login-username: ${DRUID_USERNAME:keystone}
        login-password: ${DRUID_PASSWORD}
    dynamic:
      datasource:
        master:
          url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/keystone?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
          username: ${SPRING_DATASOURCE_USERNAME:root}
          # 支持 secret:v1:aes-256-gcm 密文，开启 keystone.datasource.password-encryption.enabled 后自动解密
          password: ${SPRING_DATASOURCE_PASSWORD:12345}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations:
      - classpath:db/migrate/common
      - classpath:db/migrate/mysql

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      password: ${SPRING_DATA_REDIS_PASSWORD:12345}

logging:
  level:
    root: info
    app.keystone: info
  file:
    path: ${LOG_PATH:/app/logs}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    # 生产环境默认关闭 Swagger UI。显式开启后仍需要 Keystone 登录认证。
    enabled: ${SPRINGDOC_ENABLED:false}
