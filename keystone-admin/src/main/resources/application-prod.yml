# 生产环境配置（MySQL + Redis）
# 公共基础配置在 application-basic.yml 中；敏感值优先通过环境变量注入。

keystone:
  file-base-dir: /app/data
  auth:
    mode: mixed
    keylo:
      enabled: true
      base-url: http://10.17.17.7:2345

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

logging:
  level:
    root: info
    app.keystone: info
  file:
    path: /app/logs

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    # 生产环境默认关闭 Swagger UI。显式开启后仍需要 Keystone 登录认证。
    enabled: ${SPRINGDOC_ENABLED:false}
