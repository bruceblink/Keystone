# 生产环境配置（PostgreSQL + 生产 Redis）
# 公共连接池参数等在 application-basic.yml 中；所有敏感值通过环境变量注入

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: org.postgresql.Driver
    druid:
      statViewServlet:
        # 生产环境 Druid 控制台凭证（必须通过环境变量设置，不提供默认密码）
        login-username: ${DRUID_USERNAME:keystone}
        login-password: ${DRUID_PASSWORD}
    dynamic:
      datasource:
        master:
          url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/keystone}
          username: ${SPRING_DATASOURCE_USERNAME:postgres}
          # 支持 ENC(...) 密文，开启 keystone.datasource.password-encryption.enabled 后自动解密
          password: ${SPRING_DATASOURCE_PASSWORD:password}

  data:
    redis:
      # 可直接用完整 URL（优先级高于 host/port）
      url: ${SPRING_REDIS_URL:}
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:12345}
      database: ${SPRING_REDIS_DATABASE:0}

# 生产环境使用 PostgreSQL 方言（覆盖 basic 中的 mysql 默认值）
pagehelper:
  helperDialect: postgresql

logging:
  level:
    root: info
    app.keystone: info
  file:
    path: /app/logs

springdoc:
  swagger-ui:
    # 生产环境关闭 Swagger UI，避免接口文档泄露
    enabled: false

keystone:
  file-base-dir: /app/data
  demo-enabled: false
