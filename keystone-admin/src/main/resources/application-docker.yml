# Docker 容器环境配置（SPRING_PROFILES_ACTIVE=docker）
# 连接信息通过 docker-compose.yml 中的环境变量注入
# 公共连接池参数、Druid 监控 UI 等在 application-basic.yml 中

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    dynamic:
      datasource:
        master:
          url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/keystone?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
          username: ${SPRING_DATASOURCE_USERNAME:root}
          # 支持 ENC(...) 密文，开启 keystone.datasource.password-encryption.enabled 后自动解密
          password: ${SPRING_DATASOURCE_PASSWORD:12345}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:${SPRING_REDIS_HOST:redis}}
      port: ${SPRING_DATA_REDIS_PORT:${SPRING_REDIS_PORT:6379}}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      password: ${SPRING_DATA_REDIS_PASSWORD:${SPRING_REDIS_PASSWORD:12345}}

logging:
  level:
    app.keystone: info
  file:
    path: /app/logs

springdoc:
  swagger-ui:
    enabled: true
    url: /dev-api/v3/api-docs
    config-url: /dev-api/v3/api-docs/swagger-config

keystone:
  file-base-dir: /app/data
  api-prefix: /dev-api
  demo-enabled: false
  frontend:
    url: ${KEYSTONE_FRONTEND_URL:http://localhost:80}
