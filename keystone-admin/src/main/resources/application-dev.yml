# 本地开发环境配置（MySQL + 本地 Redis）
# 公共连接池参数、Druid 监控 UI、日志格式等在 application-basic.yml 中

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    dynamic:
      datasource:
        # 主库数据源
        master:
          url: jdbc:mysql://localhost:3306/keystone?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          username: root
          password: 12345
        # 从库数据源（按需开启）
        # slave:
        #   url: jdbc:mysql://localhost:33067/keystone?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
        #   username: root
        #   password: 12345

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: 12345

logging:
  file:
    path: D:/logs/keystone-dev

springdoc:
  swagger-ui:
    enabled: true
    url: ${keystone.api-prefix}/v3/api-docs
    config-url: ${keystone.api-prefix}/v3/api-docs/swagger-config

keystone:
  # 文件基路径（Windows: D:\keystone，Linux: /home/keystone）
  file-base-dir: D:\keystone
  api-prefix: /dev-api
  demo-enabled: false
