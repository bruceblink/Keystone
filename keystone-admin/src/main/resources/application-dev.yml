# 开发环境配置
# 默认连接 localhost；容器内运行时可通过环境变量覆盖为容器名或远程地址。

keystone:
  file-base-dir: ${KEYSTONE_FILE_BASE_DIR:D:/keystone}
  demo-enabled: false
  auth:
    mode: ${KEYSTONE_AUTH_MODE:mixed}
    keylo:
      enabled: ${KEYSTONE_AUTH_KEYLO_ENABLED:true}
      issuer-uri: ${KEYLO_ISSUER_URI:http://10.17.17.7:2345}
      jwk-set-uri: ${KEYLO_JWK_SET_URI:http://10.17.17.7:2345/.well-known/jwks.json}
      credential-verify-url: ${KEYLO_CREDENTIAL_VERIFY_URL:http://10.17.17.7:2345/v1/auth/token}
      credential-me-url: ${KEYLO_CREDENTIAL_ME_URL:http://10.17.17.7:2345/v1/auth/me}
      provisioning:
        enabled: ${KEYLO_PROVISIONING_ENABLED:false}
        create-user-url: ${KEYLO_CREATE_USER_URL:http://10.17.17.7:2345/v1/admin/users}
        admin-token-url: ${KEYLO_ADMIN_TOKEN_URL:http://10.17.17.7:2345/v1/admin/token}
        admin-client-id: ${KEYLO_ADMIN_CLIENT_ID:cli-admin-root}
        admin-client-secret: ${KEYLO_ADMIN_CLIENT_SECRET:replace-with-strong-admin-secret}
  frontend:
    url: ${KEYSTONE_FRONTEND_URL:http://localhost:80}

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    dynamic:
      datasource:
        master:
          url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/keystone?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
          username: ${SPRING_DATASOURCE_USERNAME:root}
          password: ${SPRING_DATASOURCE_PASSWORD:12345}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations:
      - classpath:db/migrate/common
      - classpath:db/migrate/mysql

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      password: ${SPRING_DATA_REDIS_PASSWORD:12345}

logging:
  level:
    app.keystone: debug
  file:
    path: ${LOG_PATH:D:/logs/keystone-dev}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    url: /v3/api-docs
    config-url: /v3/api-docs/swagger-config
