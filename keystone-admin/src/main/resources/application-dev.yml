# 开发环境配置（本地直启）
# 目标：不依赖 Docker 容器名，默认连接本机 MySQL / Redis，开箱即可本地调试。

keystone:
  file-base-dir: ${KEYSTONE_FILE_BASE_DIR:D:/keystone-dev}
  # 开发环境默认提供一把示例 RSA 私钥，便于本地联调登录。
  # 如需更换，可执行：python scripts/generate_rsa_keypair.py
  rsaPrivateKey: ${KEYSTONE_RSA_PRIVATE_KEY:}
  auth:
    # 本地开发默认使用本地账号密码登录，避免依赖外部 Keylo 服务。
    mode: ${KEYSTONE_AUTH_MODE:local}
    keylo:
      enabled: ${KEYSTONE_AUTH_KEYLO_ENABLED:false}
      base-url: ${KEYLO_BASE_URL:http://127.0.0.1:2345}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    dynamic:
      datasource:
        master:
          url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/keystone?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
          username: ${SPRING_DATASOURCE_USERNAME:root}
          password: ${SPRING_DATASOURCE_PASSWORD:12345}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      password: ${SPRING_DATA_REDIS_PASSWORD:12345}

logging:
  level:
    app.keystone: debug
  file:
    path: ${LOG_PATH:D:/logs/keystone-dev}
