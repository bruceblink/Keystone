# 开发环境配置（本地直启）
# 目标：不依赖 Docker 容器名，默认连接本机 MySQL / Redis，开箱即可本地调试。

keystone:
  file-base-dir: ${KEYSTONE_FILE_BASE_DIR:D:/keystone-dev}
  # 开发环境默认提供一把示例 RSA 私钥，便于本地联调登录。
  # 如需更换，可执行：python scripts/secret_tool.py generate-rsa
  rsaPrivateKey: ${KEYSTONE_RSA_PRIVATE_KEY:}
  auth:
    # 本地开发默认使用本地账号密码登录，避免依赖外部 Keylo 服务。
    mode: ${KEYSTONE_AUTH_MODE:mixed}
    keylo:
      enabled: ${KEYSTONE_AUTH_KEYLO_ENABLED:true}
      base-url: ${KEYLO_BASE_URL:http://localhost:2345}
      issuer-uri: ${KEYLO_ISSUER_URI:http://localhost:2345}
      trusted-issuers: ${KEYLO_TRUSTED_ISSUERS:keylo}
      jwk-set-uri: ${KEYLO_JWK_SET_URI:http://localhost:2345/.well-known/jwks.json}
      audiences: ${KEYLO_AUDIENCES:admin-backend,sys_test}
      provisioning:
        enabled: ${KEYLO_PROVISIONING_ENABLED:true}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    dynamic:
      datasource:
        master:
          url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:33066/keystone?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
          username: ${SPRING_DATASOURCE_USERNAME:root}
          password-file: ${SPRING_DATASOURCE_PASSWORD_FILE:}
          password: ${SPRING_DATASOURCE_PASSWORD:12345}
  
  flyway:
    # 开发环境显式覆盖 basic 中的 Flyway 配置，避免本地启动时自动迁移。
    enabled: false
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false
    locations:
      - classpath:db/migrate/common
      - classpath:db/migrate/mysql

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      password-file: ${SPRING_DATA_REDIS_PASSWORD_FILE:}
      password: ${SPRING_DATA_REDIS_PASSWORD:12345}

logging:
  level:
    app.keystone: debug
  file:
    path: ${LOG_PATH:D:/logs/keystone-dev}
