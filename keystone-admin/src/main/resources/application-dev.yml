# 开发环境配置
# 默认连接 localhost；容器内运行时可通过环境变量覆盖为容器名或远程地址。

keystone:
  auth:
    mode: mixed
    keylo:
      enabled: true
      base-url: http://10.17.17.7:2345

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

logging:
  level:
    app.keystone: debug
  file:
    path: ${LOG_PATH:D:/logs/keystone-dev}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    url: /v3/api-docs
