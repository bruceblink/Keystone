# =============================================================================
# 主配置 - 服务器基础设置 + 环境 Profile 激活
# 环境切换: SPRING_PROFILES_ACTIVE = dev | prod | test
#   dev   本地开发（MySQL + 本地 Redis）
#   prod  部署 / 容器运行（MySQL + Redis + Keylo）
#   test  单元/集成测试（H2 内存库）
#
# 公共配置统一放在 application-basic.yml（keystone-infrastructure 模块提供）
# =============================================================================

server:
  port: 18080
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    accept-count: 1000
    threads:
      max: 800
      min-spare: 100

spring:
  profiles:
    # 本地开发默认 dev；部署时通过环境变量覆盖为 prod
    active: prod
    group:
      dev: basic
      prod: basic
      test: basic

# SpringDoc 接口分组（admin 模块专属，其余公共配置在 application-basic.yml）
springdoc:
  group-configs:
    - group: 公共API
      packages-to-scan: app.keystone.admin.controller.common
    - group: 内置系统API
      packages-to-scan: app.keystone.admin.controller.system
