# 测试环境配置（H2 + 本地 Redis）

keystone:
  file-base-dir: ${KEYSTONE_FILE_BASE_DIR:D:/keystone}
  demo-enabled: false
  frontend:
    url: ${KEYSTONE_FRONTEND_URL:http://localhost:80}
  auth:
    mode: ${KEYSTONE_AUTH_MODE:local}
    keylo:
      enabled: ${KEYSTONE_AUTH_KEYLO_ENABLED:false}
      base-url: ${KEYLO_BASE_URL:http://127.0.0.1:2345}
      provisioning:
        enabled: ${KEYLO_PROVISIONING_ENABLED:false}
        admin-client-id: ${KEYLO_ADMIN_CLIENT_ID:cli-admin-root}
        admin-client-secret: ${KEYLO_ADMIN_CLIENT_SECRET:replace-with-strong-admin-secret}

# 公共连接池参数在 application-basic.yml 中

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.h2.Driver
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          # H2 内存数据库，MODE=MySQL 兼容 MySQL 语法
          url: jdbc:h2:mem:keystone;DB_CLOSE_DELAY=-1;MODE=MySQL
          h2:
            console:
              enabled: true
              settings:
                trace: true
                web-allow-others: true
              path: /h2-console

  flyway:
    enabled: false

  sql:
    init:
      platform: mysql
      schema-locations: classpath:db/migrate/h2/keystone_schema.sql
      data-locations: classpath:db/migrate/h2/keystone_data.sql

  # Spring Boot 3 正确路径为 spring.data.redis（原 spring.redis 已废弃）
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:36379}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      password: ${SPRING_DATA_REDIS_PASSWORD:12345}
