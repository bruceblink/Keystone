# 测试环境配置（H2 + 本地 Redis）

keystone:
  auth:
    mode: local
    keylo:
      enabled: false

spring:
  datasource:
    driver-class-name: org.h2.Driver
    dynamic:
      datasource:
        master:
          # H2 内存数据库，MODE=MySQL 兼容 MySQL 语法
          url: jdbc:h2:mem:keystone;DB_CLOSE_DELAY=-1;MODE=MySQL
          h2:
            console:
              enabled: true
              settings:
                trace: true
                web-allow-others: true
              path: /h2-console

  flyway:
    enabled: false

  data:
    redis:
      port: ${SPRING_DATA_REDIS_PORT:36379}

  sql:
    init:
      platform: mysql
      schema-locations: classpath:db/migrate/h2/keystone_schema.sql
      data-locations: classpath:db/migrate/h2/keystone_data.sql
