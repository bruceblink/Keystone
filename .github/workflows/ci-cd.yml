# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# 权限声明，确保 workflow 有权限写 checks 和 security-events
permissions:
  contents: write
  packages: write
  checks: write
  security-events: write

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - 'picture'
      - '.dockerignore'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        java-version: ['17', '21', '25']
      fail-fast: false
    
    name: Build with Java ${{ matrix.java-version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Force Maven Central mirror in CI
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <mirrors>
              <mirror>
                <id>central</id>
                <name>Maven Central Mirror</name>
                <url>https://repo.maven.apache.org/maven2</url>
                <mirrorOf>*</mirrorOf>
              </mirror>
            </mirrors>
          </settings>
          EOF

      - name: Clean corrupted embedded-redis cache
        run: rm -rf ~/.m2/repository/it/ozimov/embedded-redis

      - name: Build and Test with Maven
        run: |
          mvn -U -B verify \
            -Dmaven.test.failure.ignore=false \
            -Dgpg.skip \
            -Dmaven.javadoc.skip=false
        env:
          MAVEN_OPTS: -Xmx4g -XX:MaxMetaspaceSize=1g

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'
          detailed_summary: true
          include_passed: true
          fail_on_failure: false

      - name: Run SonarQube Analysis
        if: matrix.java-version == '17' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          if [[ -n "${{ secrets.SONAR_TOKEN }}" ]]; then
            ORG="${{ secrets.SONAR_ORGANIZATION }}"
            ORG=${ORG:-default}
            HOST="${{ secrets.SONAR_HOST_URL }}"
            HOST=${HOST:-https://sonarcloud.io}

            mvn sonar:sonar \
              -Dsonar.projectKey=agileboot \
              -Dsonar.organization=$ORG \
              -Dsonar.host.url=$HOST \
              -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
              -Dsonar.java.source=17
          else
            echo "Skipping SonarQube analysis - SONAR_TOKEN not configured"
          fi

  build-release:
    name: Build Github release
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Force Maven Central mirror in CI
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <mirrors>
              <mirror>
                <id>central</id>
                <name>Maven Central Mirror</name>
                <url>https://repo.maven.apache.org/maven2</url>
                <mirrorOf>*</mirrorOf>
              </mirror>
            </mirrors>
          </settings>
          EOF

      - name: Clean corrupted embedded-redis cache
        run: rm -rf ~/.m2/repository/it/ozimov/embedded-redis

      - name: Build release
        run: mvn -U clean package -DskipTests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Generate Changelog and Create Release
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Push Docker image to multiple registries
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    concurrency: deploy-group

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
