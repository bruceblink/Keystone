# =============================================================================
# API 模块启动配置
# 环境切换: SPRING_PROFILES_ACTIVE = dev | prod | test
#   dev   本地开发
#   prod  部署 / 容器运行
#   test  测试环境
#
# 公共配置统一放在 application-basic.yml（keystone-infrastructure 模块提供）
# =============================================================================

server:
  # 服务器的HTTP端口，默认为8080
  port: 8090
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100


# Spring配置
spring:
  profiles:
    active: dev
    group:
      dev: basic
      prod: basic
      test: basic
